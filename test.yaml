port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false

external-controller: 127.0.0.1:9090

# ================= DNS =================
dns:
  enable: true
  listen: 127.0.0.1:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback:
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853

  fallback-filter:
    geoip: true
    geoip-code: RU

# ================= PROXIES =================
proxies:
  - name: PROXY
    type: socks5
    server: 127.0.0.1
    port: 1085
    udp: true

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - PROXY
      - DIRECT

rules:
  # Россия — напрямую
  - GEOIP,RU,DIRECT
  
  # GitHub, OpenAI, YouTube — через прокси
  - DOMAIN-SUFFIX,github.com,PROXY
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,youtube.com,PROXY
  - DOMAIN-SUFFIX,instagram.com,PROXY
  
  # Telegram — локально (обход DPI)
  - DOMAIN-SUFFIX,telegram.org,LOCAL
  
  # Остальное — через прокси
  - MATCH,PROXY
