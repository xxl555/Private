# ================= GROUPS =================
proxy-groups:

  - name: 🌍 Auto
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🇳🇱 NL-1
      - 🇩🇪 DE-1
      - 🇫🇮 FI-1

  - name: ♻️ Failover
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 60
    proxies:
      - 🇳🇱 NL-1
      - 🇩🇪 DE-1
      - 🇫🇮 FI-1

  - name: 🛡️ Anti-DPI
    type: select
    proxies:
      - 🚀 AWG 1.5 (Вариант 1)
      - 🚀 AWG 1.5 (Вариант 2)
      - 🚀 AWG 1.5 (Вариант 3)
      - 🇫🇮 FI-1

  - name: ⚡ Main
    type: select
    proxies:
      - ♻️ Failover
      - 🛡️ Anti-DPI
      - 🚀 AWG 1.5 (Вариант 1)
      - 🚀 AWG 1.5 (Вариант 2)
      - 🚀 AWG 1.5 (Вариант 3)
      - DIRECT

# ================= RULES =================
rules:

  # Мессенджеры (обход DPI)
  - DOMAIN-SUFFIX,telegram.org,🛡️ Anti-DPI
  - DOMAIN-SUFFIX,t.me,🛡️ Anti-DPI
  - DOMAIN-SUFFIX,instagram.com,🛡️ Anti-DPI
  - DOMAIN-SUFFIX,cdninstagram.com,🛡️ Anti-DPI

  # YouTube (через стабильные сервера)
  - DOMAIN-SUFFIX,youtube.com,🌍 Auto
  - DOMAIN-SUFFIX,googlevideo.com,🌍 Auto
  - DOMAIN-SUFFIX,ytimg.com,🌍 Auto
  - DOMAIN-KEYWORD,youtube,🌍 Auto
  - DOMAIN-KEYWORD,googlevideo,🌍 Auto

  # Viber (только быстрый канал!)
  - PROCESS-NAME,com.viber.voip,🌍 Auto

  # Россия напрямую (ускоряет всё остальное)
  - GEOIP,RU,DIRECT

  # Остальное
  - MATCH,⚡ Main
