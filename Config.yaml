port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false

external-controller: 127.0.0.1:9090

# ================= DNS =================
dns:
  enable: true
  listen: 127.0.0.1:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback:
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853

  fallback-filter:
    geoip: true
    geoip-code: RU

# ================= PROXIES =================
proxies:

  - name: "🇳🇱 NL-1"
    type: wireguard
    server: nl.tribukvy.ltd
    port: 500
    ip: 172.16.0.2
    private-key: APd6Exl4fD/nv6B4PaKz70vR3pFmXG0O5IGl5hOD6FM=
    public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
    udp: true
    mtu: 1380
    dns: [1.1.1.1]
    amnezia-wg-option:
      jc: 10
      jmin: 20
      jmax: 80

  - name: "🇩🇪 DE-1"
