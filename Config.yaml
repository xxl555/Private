tun:
  enable: true
  auto-route: true
  auto-detect-interface: true   # Автоматически подхватывает смену Wi-Fi/мобильных данных
  # Для TCP-соединений
keep-alive-idle: 30      # Начинать проверку через 30 секунд простоя
keep-alive-interval: 10  # Зонды каждые 10 секунд
keep-alive-count: 3      # Разрывать после 3 неудачных попыток (всего 30+10+10 = 50 секунд)

# Для UDP (игры, видео, голосовые звонки)
udp-keep-alive: 15       # Отправлять keep-alive каждые 15 секунд
# Глобальная секция (в корне config.yaml)
network:
  enforce-route: true
  reconnect-on-network-change: true
  auto-redirect: true
proxies:

  - name: "🇳🇱 NL-141"
    type: wireguard
    server: 169.150.218.36
    port: 51820
    ip: 10.2.0.2
    private-key: GLlTwwNycXzf6eF+842Nk5in41AS6wZwb0a+r+Uuh1Q=
    public-key: dsRnvFvkIU88ibWwPaJ86srhLNHfiKUWxFTIpg4IOms=
    allowed-ips: ['0.0.0.0/0']
    udp: true
    mtu: 1280
    remote-dns-resolve: true
    dns: [10.2.0.1]
    persistent-keepalive: 25
    amnezia-wg-option:
      jc: 5
      jmin: 2
      jmax: 6
      s1: 0
      s2: 0
      h1: 1
      h2: 2
      h3: 3
      h4: 4
      i1: <b >
      #i1: <b >

proxy-groups:
  
  
  - name: "🔄 Основной"
    type: select
    proxies:
      - "🇳🇱 NL-141"
      - "DIRECT"

rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
    
  # Российские домены (всегда напрямую)
  ru-direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/ru-direct.yaml
    interval: 86400

  # Заблокированные в РФ домены (всегда через прокси)
  ru-proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/ru-proxy.yaml
    interval: 86400

rules:
# 1. Явное правило для основных сервисов Яндекса (НАПРЯМУЮ)
  - DOMAIN-SUFFIX,yandex.ru,DIRECT
  - DOMAIN-SUFFIX,ya.ru,DIRECT
  - DOMAIN-SUFFIX,yandex.net,DIRECT
  - DOMAIN-SUFFIX,yastatic.net,DIRECT
  - DOMAIN-SUFFIX,yandexcloud.net,DIRECT
  - DOMAIN-SUFFIX,*.RU,DIRECT
  - RULE-SET,reject,REJECT
  - GEOIP,private,DIRECT,no-resolve
  - RULE-SET,ru-direct,DIRECT
  - RULE-SET,ru-proxy,🔄 Основной
  - GEOIP,RU,DIRECT
  - MATCH,🔄 Основной

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  fallback:
    - tls://1.1.1.1
    - tls://8.8.8.8
  fallback-filter:
    geoip: true
    geoip-code: RU

sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80]
  override-destination: true
